function htmlToText(html) {
  if (!html) return '';
  let s = String(html);
  s = s.replace(/<br\s*\/?>/gi, '\n').replace(/<\/(div|p)>/gi, '\n');
  s = s.replace(/<[^>]+>/g, '');
  const txt = document.createElement('textarea');
  txt.innerHTML = s;

}

const GEMINI_SYSTEM_PROMPT = `[Role]
너는 특허 분석 및 침해 검토(Claim Chart 작성)를 전문으로 하는 최고의 시니어 변리사(Patent Attorney)이자 시스템 엔진이다. 입력되는 특허 독립항을 침해 소송 및 감정에 즉시 활용할 수 있도록 '구성요소별 분해(Element-by-Element Breakdown)'를 수행하라.

[Core Principle: 원문 절대 보존 (Literal Wording Principle)]
- 절대 청구항 원문을 임의로 요약, 축약, 생략하거나 쉬운 단어로 치환하지 말 것.
- 조사, 어미, 특수문자를 포함하여 청구항에 기재된 '있는 그대로'의 텍스트(Literal Text)를 구성요소별로 완벽하게 분기(Segmentation)해야 한다.
- 의미를 해석하는 것은 '기술적 의미 및 기능(해설)' 란에만 작성하고, '청구항 원문' 란에는 오직 원문 텍스트만 분할하여 배치하라.

[Advanced Breakdown Rules]
1. 분기 단위 (Granularity): [객체/단계 + 해당 객체의 기능/동작/연결관계]를 하나의 구성요소(Element) 단위로 분기하되, 문장 전체가 누락 없이 이어지도록 분할하라.
2. 지칭어 추적 (Antecedent Basis): '상기(said) ~부', '이의', '그 ~'가 등장하면, 이전에 처음 정의된(Introduced) 어떤 구성요소를 가리키는지 매핑 관계를 명확히 하라.
3. 유기적 결합 관계: 각 구성요소가 타 구성요소와 맺고 있는 데이터 흐름, 물리적 연결, 제어 관계를 추적하라.

[Category-Specific Branching (발명 종류별 분기 고도화)]
입력된 독립항의 말미(Preamble 및 종결어)를 분석하여 발명의 카테고리를 자동으로 판별하고 아래 기준 적용하라.
- [물건/장치/시스템 발명]: 물리적/논리적 구조체(하드웨어 모듈, 소프트웨어 컴포넌트)를 기준으로 분기.
- [방법/공정 발명]: 시간적 선후 관계 및 시계열적 단계(Sequence/Step)를 기준으로 분기.

[Means-Plus-Function Treatment (기능형 청구항 고도화 처리)]
- 청구항 원문에 물리적 구조 없이 "~하기 위한 수단(Means for~)", "~ 구비하는 부(Unit for~)" 등 기능으로만 정의된 요소가 있다면, 이를 '기능형 구성요소'로 특별 관리한다.
- 해설란에 [기능형 청구항 판정] 표기를 하고, 추후 명세서 상세한 설명(Detailed Description)에서 매핑해야 할 구조나 알고리즘의 대상이 됨을 명시하라.

[Exception Handling]
문맥상 구성요소의 경계가 모호하여 하나의 문장에 여러 구성요소가 섞여 있는 경우에도 원문을 임의로 쪼개서 요약하지 말고, 복합 구성요소(Combined Element)로 묶어 원문을 통째로 기재한 뒤 해설란에 각 요소를 분리하여 설명하라.

[Output Format - 시스템 통합용]
위의 변리사 분석 원칙(원문 절대 보존, 분기 단위, 지칭어 추적, Category-Specific Branching, Means-Plus-Function 처리)을 100% 동일하게 적용하되, 결과는 반드시 아래 JSON 배열 형식으로만 출력하라. 마크다운 테이블이나 코드 펜스(\\\`\\\`\\\`json), 설명 텍스트는 절대 포함하지 말 것. 첫 번째 요소는 반드시 Element 0(전제부)이며, 모든 "text" 필드를 위에서 아래로 합치면 입력된 청구항 원문과 정확히 일치해야 한다.

구조:
[
  {
    "name": "구성요소 명칭 (예: 전제부, 트레드부, 흡음재 등)",
    "text": "청구항 원문 텍스트 100% 그대로 (요약/치환 절대 금지, 조사·어미·특수문자 보존)",
    "meaning": "기술적 의미 및 기능 (변리사 해설). Element 0에는 발명 카테고리 판별 결과(장치형/방법형) 포함",
    "relation": "타 구성요소와의 유기적 결합/연결 관계 및 고도화 분석",
    "isFunctional": false
  }
]

isFunctional이 true이면 "기능형 청구항 판정"으로 해설란에 자동 표기됨. 코드 펜스 절대 금지, 오직 JSON 배열만 출력.`;

async function geminiDecomposeClaim(claimText, apiKey) {
  if (!apiKey) throw new Error('Gemini API 키가 설정되지 않았습니다.');
  if (!claimText || claimText.trim().length < 10) throw new Error('분해할 청구항 텍스트가 너무 짧습니다.');

  // 시도할 모델 목록 (앞에서부터 순차 시도, 하나 성공하면 종료)
  const MODELS = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-flash-latest'];

  const body = {
    systemInstruction: { parts: [{ text: GEMINI_SYSTEM_PROMPT }] },
    contents: [{ role: 'user', parts: [{ text: `다음 독립항을 구성요소별로 분해하라:\n\n${claimText}` }] }],
    generationConfig: {
      temperature: 0.2,
      responseMimeType: 'application/json',
    }
  };

  let lastErr = null;
  let res = null;

  // 각 모델에 대해 최대 2회 시도 (첫 시도 실패 시 1.5초 후 재시도)
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  outer:
  for (const model of MODELS) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

    for (let attempt = 1; attempt <= 2; attempt++) {
      try {
        res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
      } catch (netErr) {
        throw new Error('네트워크 연결 실패 — 회사 방화벽이 generativelanguage.googleapis.com 접속을 차단했을 수 있습니다. IT팀에 문의하거나 다른 네트워크(개인 핫스팟 등)에서 시도해 보세요.');
      }

      if (res.ok) break outer; // 성공이면 모든 루프 탈출

      // 503 (모델 과부하/일시적 장애)이면 같은 모델로 1회 재시도
      if (res.status === 503 && attempt === 1) {
        await sleep(1500);
        continue; // 같은 모델로 다시 시도
      }

      // 404 또는 503 2번 실패 → 다음 모델 시도
      if (res.status === 404 || res.status === 503) {
        lastErr = `모델 '${model}' 사용 불가 (HTTP ${res.status})`;
        continue outer; // 다음 모델로
      }

      // 그 외 에러는 즉시 안내
      let errMsg = `HTTP ${res.status}`;
      try {
        const e = await res.json();
        const raw = e?.error?.message || '';
        if (res.status === 400 && /API key not valid/i.test(raw)) {
          errMsg = 'API 키가 유효하지 않습니다. 키를 다시 확인하거나 새로 발급하세요.';
        } else if (res.status === 403) {
          errMsg = 'API 키 권한이 없습니다. Google AI Studio에서 키가 활성화되어 있는지 확인하세요.';
        } else if (res.status === 429) {
          errMsg = '호출 한도 초과 (분당 15회). 잠시 후 다시 시도하세요.';
        } else {
          errMsg = raw || errMsg;
        }
      } catch {}
      throw new Error(errMsg);
    }
  }

  if (!res || !res.ok) {
    throw new Error('모든 Gemini 모델이 일시적으로 사용 불가입니다. 잠시 후 다시 시도해 주세요. (' + (lastErr || '') + ')');
  }

  if (!res || !res.ok) {
    throw new Error('사용 가능한 Gemini 모델을 찾지 못했습니다. ' + (lastErr || '') + ' Google AI Studio에서 사용 가능한 모델을 확인해 주세요.');
  }

  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
  if (!text) throw new Error('Gemini가 빈 응답을 반환했습니다.');

  // JSON 추출 (혹시 코드 펜스가 섞여 나오는 경우 대비)
  let jsonText = text.trim();
  jsonText = jsonText.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '').trim();

  let parsed;
  try { parsed = JSON.parse(jsonText); }
  catch (e) { throw new Error('Gemini 응답을 JSON으로 파싱할 수 없습니다: ' + jsonText.slice(0, 150)); }

  if (!Array.isArray(parsed)) throw new Error('Gemini 응답이 배열 형식이 아닙니다.');
  return parsed.map(item => ({
    text: (item.text || '').trim(),
    match: '',
    note: ''
  }));
}

    id: Date.now(), db: '키워드', country: 'KR, JP, US, EP, DE, FR, PCT', query: '', count: ''
  }]);
  const updateSearch = (id, field, value) =>
    setSearches(searches.map(s => s.id === id ? { ...s, [field]: value } : s));
  const removeSearch = (id) => setSearches(searches.filter(s => s.id !== id));

  const buildPatentNumber = (cc, reg, pub, kindCode) => {
    cc = String(cc || '').trim().toUpperCase();
    reg = String(reg || '').trim();
    pub = String(pub || '').trim();
    const kc = String(kindCode || '').trim().toUpperCase();
    const targetNo = (reg && reg !== '-' && reg !== ' ') ? reg : pub;
    if (!targetNo || targetNo === ' ') return cc;
    if (cc && targetNo.toUpperCase().startsWith(cc)) {
      return (kc && !targetNo.toUpperCase().endsWith(kc)) ? targetNo + kc : targetNo;
    }
    if (cc === 'PCT') {
      if (targetNo.toUpperCase().startsWith('WO')) {
        return (kc && !targetNo.toUpperCase().endsWith(kc)) ? targetNo + kc : targetNo;
      }
      return 'WO' + targetNo + (kc || '');
    }
    return cc + targetNo + (kc || '');
  };

  const formatDate = (val) => {
    if (val === null || val === undefined || val === '') return '';
    if (typeof val === 'number') {
      const d = new Date((val - 25569) * 86400 * 1000);
      return `${String(d.getFullYear()).slice(2)}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
    }
    const s = String(val).trim();
    if (!s || s === ' ') return '';
    const m = s.match(/^(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
    if (m) return `${m[1].slice(2)}.${m[2].padStart(2, '0')}.${m[3].padStart(2, '0')}`;
    return s;
  };

  // ============ ZIP 파서 ============
  const parseZip = async (arrayBuffer) => {
    const view = new DataView(arrayBuffer);
    const u8 = new Uint8Array(arrayBuffer);
    const entries = {};
    let eocdOffset = -1;
    for (let i = view.byteLength - 22; i >= Math.max(0, view.byteLength - 65557); i--) {
      if (view.getUint32(i, true) === 0x06054b50) { eocdOffset = i; break; }
    }
    if (eocdOffset < 0) throw new Error('ZIP EOCD를 찾을 수 없음');
    const cdEntries = view.getUint16(eocdOffset + 10, true);
    let cdOffset = view.getUint32(eocdOffset + 16, true);
    const decoder = new TextDecoder('utf-8');
    for (let i = 0; i < cdEntries; i++) {
      if (view.getUint32(cdOffset, true) !== 0x02014b50) break;
      const method = view.getUint16(cdOffset + 10, true);
      const compSize = view.getUint32(cdOffset + 20, true);
      const nameLen = view.getUint16(cdOffset + 28, true);
      const extraLen = view.getUint16(cdOffset + 30, true);
      const commentLen = view.getUint16(cdOffset + 32, true);
      const localOffset = view.getUint32(cdOffset + 42, true);
      const name = decoder.decode(u8.slice(cdOffset + 46, cdOffset + 46 + nameLen));
      const localNameLen = view.getUint16(localOffset + 26, true);
      const localExtraLen = view.getUint16(localOffset + 28, true);
      const dataStart = localOffset + 30 + localNameLen + localExtraLen;
      const compressed = u8.slice(dataStart, dataStart + compSize);
      entries[name] = { method, compressed };
      cdOffset += 46 + nameLen + extraLen + commentLen;
    }
    const inflate = async (entry) => {
      if (entry.method === 0) return entry.compressed;
      if (entry.method === 8) {
        const stream = new Response(entry.compressed).body
          .pipeThrough(new DecompressionStream('deflate-raw'));
        const buf = await new Response(stream).arrayBuffer();
        return new Uint8Array(buf);
      }
      throw new Error(`Unsupported: ${entry.method}`);
    };
    return {
      entries,
      async getText(path) {
        const e = entries[path]; if (!e) return null;
        return new TextDecoder('utf-8').decode(await inflate(e));
      },
      async getBytes(path) {
        const e = entries[path]; if (!e) return null;
        return await inflate(e);
      }
    };
  };

  const parseImageMap = (drawingXml, relsXml) => {
    const ridToImage = {};
    for (const m of relsXml.matchAll(/Id="(rId\d+)"\s+Target="([^"]+)"/g)) {
      let target = m[2];
      if (target.startsWith('/')) target = target.slice(1);
      else if (target.startsWith('../')) target = 'xl/' + target.slice(3);
      else target = 'xl/drawings/' + target;
      ridToImage[m[1]] = target;
    }
    const rowToImage = {};
    const anchorRegex = /<(twoCellAnchor|oneCellAnchor)[^>]*>([\s\S]*?)<\/\1>/g;
    let match;
    while ((match = anchorRegex.exec(drawingXml)) !== null) {
      const block = match[2];
      const rowMatch = block.match(/<xdr:from>[\s\S]*?<xdr:row>(\d+)<\/xdr:row>/) ||
                       block.match(/<from>[\s\S]*?<row>(\d+)<\/row>/);
      const embedMatch = block.match(/r:embed="(rId\d+)"/);
      if (rowMatch && embedMatch) {
        const row = parseInt(rowMatch[1], 10);
        const imgPath = ridToImage[embedMatch[1]];
        if (imgPath) rowToImage[row] = imgPath;
      }
    }
    return rowToImage;
  };

  const bytesToDataUrl = (bytes, ext) => {
    let binary = '';
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    const base64 = btoa(binary);
    const mime = ext === 'png' ? 'image/png' :
                 ext === 'gif' ? 'image/gif' :
                 ext === 'bmp' ? 'image/bmp' : 'image/jpeg';
    return `data:${mime};base64,${base64}`;
  };

  const handleFileUpload = useCallback(async (event) => {
    const file = event.target.files?.[0];
    if (!file) return;
    setUploadStatus({ type: 'loading', message: '엑셀 파일 분석 중...' });
    try {
      const arrayBuffer = await file.arrayBuffer();
      const workbook = XLSX.read(arrayBuffer, { type: 'array' });
      const worksheet = workbook.Sheets[workbook.SheetNames[0]];
      const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
      if (jsonData.length < 2) throw new Error('데이터 행이 부족합니다.');
      const headers = jsonData[0].map(h => String(h).trim());
      const rows = jsonData.slice(1);

      let rowImageMap = {};
      try {
        const zip = await parseZip(arrayBuffer);
        const drawingXml = await zip.getText('xl/drawings/drawing1.xml');
        const relsXml = await zip.getText('xl/drawings/_rels/drawing1.xml.rels');
        if (drawingXml && relsXml) {
          const rowToImagePath = parseImageMap(drawingXml, relsXml);
          for (const [row, path] of Object.entries(rowToImagePath)) {
            const dataRowIdx = parseInt(row, 10) - 1;
            const bytes = await zip.getBytes(path);
            if (bytes) {
              const ext = path.split('.').pop().toLowerCase();
              rowImageMap[dataRowIdx] = bytesToDataUrl(bytes, ext);
            }
          }
        }
      } catch (imgErr) { console.warn('이미지 추출 실패:', imgErr); }

      const findCol = (exactNames, ...partial) => {
        for (const n of exactNames) {
          const i = headers.findIndex(h => h === n);
          if (i !== -1) return i;
        }
        for (const n of partial) {
          const i = headers.findIndex(h => h.toLowerCase().includes(n.toLowerCase()));
          if (i !== -1) return i;
        }
        return -1;
      };

      const col = {
        countryCode: findCol(['국가코드'], 'country'),
        publicationNo: findCol(['공개번호'], 'publication'),
        registrationNo: findCol(['등록번호'], 'registration'),
        kindCode: findCol(['문헌종류 코드'], 'kind code'),
        applicant: findCol(['출원인'], '권리자', 'applicant'),
        appDate: findCol(['출원일'], 'application date', 'filing'),
        indClaimOrig: findCol(['독립청구항[KR,JP,US,CN,EP,IN]'], '독립청구항['),
        indClaimTrans: findCol(['독립청구항-번역문[JP,US,CN,EP]'], '독립청구항-번역문'),
        repClaim: findCol(['대표청구항'], '대표청구항'),
        repClaimTrans: findCol(['대표청구항-번역문'], '대표청구항-번역문'),
        wipsFamily: findCol(['WIPS패밀리 문헌번호(출원기준)'], 'wips패밀리 문헌번호'),
        wipsBasic: findCol(['WIPS패밀리 Basic Patent 문헌번호'], 'basic patent'),
        detailLink: findCol(['상세보기 링크(비로그인)'], '상세보기'),
        title: findCol(['발명의 명칭-번역문', '발명의 명칭'], 'title'),
        comparison: findCol(['당사 컨셉 비교'], '컨셉 비교', 'comparison'),
        riskComment: findCol(['Risk 코멘트'], 'risk', '위험')
      };

      const cleanVal = (v) => {
        const s = String(v ?? '').trim();
        return (s === '' || s === ' ' || s === '-') ? '' : s;
      };
      const koreanRatio = (text) => {
        if (!text) return 0;
        const s = String(text);
        return (s.match(/[가-힣]/g) || []).length / Math.max(s.length, 1);
      };
      const pickKoreanClaim = (row) => {
        const candidates = [
          col.indClaimTrans !== -1 ? row[col.indClaimTrans] : null,
          col.repClaimTrans !== -1 ? row[col.repClaimTrans] : null,
          col.indClaimOrig !== -1 ? row[col.indClaimOrig] : null,
          col.repClaim !== -1 ? row[col.repClaim] : null,
        ];
        let best = '', bestScore = 0;
        for (const c of candidates) {
          const text = cleanVal(c);
          if (!text || text.length < 50) continue;
          const ratio = koreanRatio(text);
          if (ratio < 0.15) continue;
          const score = ratio * Math.sqrt(text.length);
          if (score > bestScore) { bestScore = score; best = text; }
        }
        return best;
      };
      const refineClaim = (text) => {
        if (!text) return '';
        const s = String(text).trim();
        const parts = s.split(/\s*\|\s*/);
        const koreanParts = parts.filter(p => koreanRatio(p) > 0.15);
        const joined = koreanParts.length ? koreanParts.join('\n\n') : s;
        return joined
          .replace(/【청구항\s*(\d+)】/g, '【청구항 $1】\n')
          .replace(/【請求項\s*(\d+)】/g, '【청구항 $1】\n')
          .trim();
      };

      let usedImages = 0;
      const parsedPatents = rows
        .map((row, originalIdx) => ({ row, originalIdx }))
        .filter(({ row }) => row.some(c => c !== '' && c !== ' '))
        .map(({ row, originalIdx }, idx) => {
          const cc = col.countryCode !== -1 ? cleanVal(row[col.countryCode]) : '';
          const pub = col.publicationNo !== -1 ? cleanVal(row[col.publicationNo]) : '';
          const reg = col.registrationNo !== -1 ? cleanVal(row[col.registrationNo]) : '';
          const kc = col.kindCode !== -1 ? cleanVal(row[col.kindCode]) : '';
          const basic = col.wipsBasic !== -1 ? cleanVal(row[col.wipsBasic]) : '';
          const patentNo = basic || buildPatentNumber(cc, reg, pub, kc);
          let claim = refineClaim(pickKoreanClaim(row));
          const figure = rowImageMap[originalIdx] || null;
          if (figure) usedImages++;
          return {
            id: Date.now() + idx,
            patentNo, countryCode: cc, publicationNo: pub, registrationNo: reg,
            applicant: col.applicant !== -1 ? cleanVal(row[col.applicant]) : '',
            appDate: col.appDate !== -1 ? formatDate(row[col.appDate]) : '',
            statusRows: [{ status: '등록', country: '' }],
            wipsFamily: col.wipsFamily !== -1 ? cleanVal(row[col.wipsFamily]) : '',
            detailLink: col.detailLink !== -1 ? cleanVal(row[col.detailLink]) : '',
            title: col.title !== -1 ? cleanVal(row[col.title]) : '',
            independentClaim: claim,
            claimComponents: [{ text: '', match: '', note: '' }],
            comparison: col.comparison !== -1 ? cleanVal(row[col.comparison]) : '',
            comparisonImage: null,
            figure, figureName: figure ? '엑셀 임베드' : '', figureCaption: '', figureRotation: 0,
            riskComment: col.riskComment !== -1 ? cleanVal(row[col.riskComment]) : '',
            patentRisk: '검토중',
            monitoring: false
          };
        });

      setPatents(parsedPatents);
      setUploadStatus({
        type: 'success',
        message: `총 ${parsedPatents.length}건 분석 완료 · 대표도면 ${usedImages}건 자동 추출됨`
      });
      setTimeout(() => setUploadStatus(null), 5000);
    } catch (err) {
      console.error(err);
      setUploadStatus({ type: 'error', message: `오류: ${err.message}` });
    } finally {
      // 같은 파일을 다시 선택해도 onChange가 발생하도록 input 값 초기화
      if (event.target) event.target.value = '';
    }
  }, []);

  const updatePatent = (id, field, value) =>
    setPatents(patents.map(p => p.id === id ? { ...p, [field]: value } : p));

  const handleFigureUpload = (id, file) => {
    if (!file) return;

    reader.onload = e => setPatents(prev => prev.map(p =>
      p.id === id ? { ...p, figure: e.target.result, figureName: file.name } : p
    ));
    reader.readAsDataURL(file);
  };

  const addPatent = () => setPatents([...patents, {

    applicant: '', appDate: '',
    statusRows: [{ status: '등록', country: '' }],

    independentClaim: '',

  }]);

  const riskStats = useMemo(() => {

    });

        if (file) { handleTargetImageUpload(file); e.preventDefault(); break; }
      }

  }, []);
  const handleTargetDrop = (e) => {
    e.preventDefault(); e.stopPropagation();

  useEffect(() => {
    const el = targetDropRef.current;

  };

function StatCard({ icon, label, value, unit, accent, tint, emphasize }) {

      border: `1px solid ${emphasize ? accent + '50' : '#f0f1f3'}`,
      borderRadius: '14px',
      padding: '18px 20px',
      transition: 'all 0.2s',
      cursor: 'default',
      position: 'relative',
      overflow: 'hidden'
    }}>
      {emphasize && (
        <div style={{
          position: 'absolute', top: 0, left: 0, bottom: 0,
          width: '3px', background: accent
        }}></div>
      )}
      <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '14px' }}>
        <div style={{ width: '32px', height: '32px', background: tint, borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: accent }}>
          {icon}
        </div>
        <span style={{ fontSize: '12px', color: '#8a8f96', fontWeight: 700 }}>{label}</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: '5px' }}>
        <span style={{ fontSize: '32px', fontWeight: 800, color: emphasize ? accent : '#1a1a1a', letterSpacing: '-0.03em', lineHeight: 1 }}>{value}</span>
        <span style={{ fontSize: '13px', color: '#b0b3b8', fontWeight: 600 }}>{unit}</span>

    </div>
  );
}

// =====================================================================
// Risk 선택기 (라이트) — 낮음/높음 + 직접 입력
// =====================================================================
function RiskSelector({ value, onChange }) {
  const [mode, setMode] = useState(() => (value === '높음' || value === '낮음') ? 'preset' : 'custom');
  const presets = [
    { val: '낮음', color: '#16a34a', bg: '#f0fdf4', border: '#bbf7d0', icon: '✓' },
    { val: '높음', color: '#dc2626', bg: '#fef2f2', border: '#fecaca', icon: '⚠' }
  ];
  return (
    <div style={{ background: '#fafbfc', borderRadius: '11px', padding: '5px', border: '1px solid #ebedf0', display: 'flex', flexDirection: 'column', gap: '5px' }}>
      <div style={{ display: 'flex', gap: '5px' }}>
        {presets.map(opt => {
          const active = mode === 'preset' && value === opt.val;
          return (
            <button key={opt.val} onClick={() => { setMode('preset'); onChange(opt.val); }}
              style={{ flex: 1, padding: '9px 6px', background: active ? opt.bg : 'transparent', border: active ? `1.5px solid ${opt.border}` : '1.5px solid transparent', borderRadius: '8px', cursor: 'pointer', fontSize: '13px', fontWeight: 800, color: active ? opt.color : '#a1a1aa', transition: 'all 0.15s', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px' }}>
              <span style={{ fontSize: '14px' }}>{opt.icon}</span><span>{opt.val}</span>
            </button>
          );
        })}
        <button onClick={() => { setMode('custom'); if (value === '높음' || value === '낮음') onChange(''); }}
          style={{ flex: 0.8, padding: '9px 6px', background: mode === 'custom' ? '#fff7ed' : 'transparent', border: mode === 'custom' ? '1.5px solid #fed7aa' : '1.5px solid transparent', borderRadius: '8px', cursor: 'pointer', fontSize: '11px', fontWeight: 800, color: mode === 'custom' ? '#c2410c' : '#a1a1aa', transition: 'all 0.15s' }}>
          직접 입력
        </button>
      </div>
      {mode === 'custom' && (
        <input value={value} onChange={e => onChange(e.target.value)} placeholder="예: 보유, 검토 중, 추가 분석 필요..." autoFocus
          style={{ background: '#fff', border: '1px solid #ebedf0', padding: '9px 11px', fontSize: '13px', fontWeight: 600, color: '#1a1a1a', outline: 'none', borderRadius: '8px' }}
          onFocus={e => e.currentTarget.style.borderColor = '#FF5300'} onBlur={e => e.currentTarget.style.borderColor = '#ebedf0'} />
      )}
    </div>
  );
}

// =====================================================================
// 자동 리사이즈 텍스트영역
// =====================================================================
function AutoTextarea({ value, onChange, placeholder, style, minHeight = 24, className = 'auto-textarea' }) {
  const ref = useRef(null);
  const resize = () => {
    if (!ref.current) return;
    ref.current.style.height = 'auto';
    ref.current.style.height = Math.max(ref.current.scrollHeight, minHeight) + 'px';
  };
  useEffect(() => { resize(); }, [value]);
  return (
    <textarea ref={ref} value={value} onChange={e => { onChange(e.target.value); resize(); }} onInput={resize} placeholder={placeholder} className={className} style={style} rows={1} />
  );
}

// =====================================================================
// 도면 확대 뷰어 (드래그 이동 + 회전 + 구성요소 패널)
// =====================================================================
function ZoomViewer({ data, onClose }) {
  // 과거 호환: 문자열로 들어올 수도 있음
  const normalized = typeof data === 'string' ? { src: data, rotation: 0 } : data;
  const { src, patent } = normalized;
  const [rotation, setRotation] = useState(normalized.rotation || 0);
  const [scale, setScale] = useState(1);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef({ x: 0, y: 0, startX: 0, startY: 0 });
  const [showPanel, setShowPanel] = useState(!!(patent && (patent.claimComponents || patent.independentClaim || patent.figureCaption)));

  // ESC 키 닫기
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  const handleMouseDown = (e) => {
    e.preventDefault();
    setDragging(true);
    dragStart.current = { x: e.clientX, y: e.clientY, startX: pos.x, startY: pos.y };
  };
  const handleMouseMove = (e) => {
    if (!dragging) return;
    setPos({
      x: dragStart.current.startX + (e.clientX - dragStart.current.x),
      y: dragStart.current.startY + (e.clientY - dragStart.current.y)
    });
  };
  const handleMouseUp = () => setDragging(false);

  // 휠로 줌인/줌아웃
  const handleWheel = (e) => {
    e.preventDefault();
    setScale(s => Math.max(0.3, Math.min(5, s + (e.deltaY < 0 ? 0.15 : -0.15))));
  };

  const resetView = () => { setScale(1); setPos({ x: 0, y: 0 }); };

  const hasComponents = patent && patent.claimComponents && patent.claimComponents.length > 0 && patent.claimComponents.some(c => c.text);
  const hasClaim = patent && patent.independentClaim;
  const hasCaption = patent && patent.figureCaption && patent.figureCaption.trim().length > 0;

  return (
    <div
      style={{
        position: 'fixed', inset: 0, zIndex: 1000,
        background: 'rgba(10,10,15,0.92)', backdropFilter: 'blur(4px)',
        display: 'flex', flexDirection: 'column'
      }}>
      {/* 상단 툴바 */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '12px 20px', background: 'rgba(0,0,0,0.4)',
        borderBottom: '1px solid rgba(255,255,255,0.08)'
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', color: '#fff', fontSize: '13px', fontWeight: 700 }}>
          {patent?.patentNo && <span style={{ background: 'rgba(255,83,0,0.2)', color: '#FFB380', padding: '3px 10px', borderRadius: '6px', fontSize: '12px' }}>{patent.patentNo}</span>}
          {patent?.title && <span style={{ color: '#a1a1aa', fontWeight: 500, fontSize: '12px' }}>{patent.title}</span>}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
          <ViewerBtn onClick={() => setRotation((rotation + 90) % 360)} title="90° 회전 (반시계)">↺</ViewerBtn>
          <ViewerBtn onClick={() => setRotation((rotation + 270) % 360)} title="90° 회전 (시계)">↻</ViewerBtn>
          <ViewerSeparator />
          <ViewerBtn onClick={() => setScale(s => Math.min(5, s + 0.25))} title="확대">＋</ViewerBtn>
          <ViewerBtn onClick={() => setScale(s => Math.max(0.3, s - 0.25))} title="축소">−</ViewerBtn>
          <ViewerBtn onClick={resetView} title="원위치">⟲</ViewerBtn>
          <span style={{ color: '#a1a1aa', fontSize: '11px', fontWeight: 700, padding: '0 6px' }}>{Math.round(scale * 100)}%</span>
          {(hasComponents || hasClaim || hasCaption) && (
            <>
              <ViewerSeparator />
              <button
                onClick={() => setShowPanel(!showPanel)}
                style={{
                  background: showPanel ? '#FF5300' : 'rgba(255,255,255,0.12)',
                  border: '1px solid rgba(255,255,255,0.2)',
                  color: '#fff', padding: '6px 12px', borderRadius: '7px',
                  cursor: 'pointer', fontSize: '11.5px', fontWeight: 700, fontFamily: 'inherit'
                }}>
                {showPanel ? '정보 숨기기' : '정보 보기'}
              </button>
            </>
          )}
          <ViewerSeparator />
          <button
            onClick={onClose}
            style={{
              width: '36px', height: '36px', borderRadius: '50%',
              background: 'rgba(255,255,255,0.15)', border: '1px solid rgba(255,255,255,0.25)',
              color: '#fff', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>
            <X size={18} />
          </button>
        </div>
      </div>

      {/* 본문 — 2분할 */}
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        {/* 도면 영역 (드래그 이동/줌 가능) */}
        <div
          onMouseDown={handleMouseDown}
          onMouseMove={handleMouseMove}
          onMouseUp={handleMouseUp}
          onMouseLeave={handleMouseUp}
          onWheel={handleWheel}
          style={{
            flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
            overflow: 'hidden', cursor: dragging ? 'grabbing' : 'grab',
            userSelect: 'none'
          }}>
          <img
            src={src}
            alt="확대 도면"
            draggable={false}
            style={{
              maxWidth: '90%', maxHeight: '90%',
              objectFit: 'contain', background: '#fff',
              padding: '12px', borderRadius: '8px',
              boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
              transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale}) rotate(${rotation}deg)`,
              transition: dragging ? 'none' : 'transform 0.18s ease',
              pointerEvents: 'none'
            }}
          />
          {/* 안내 (도면 영역 좌하단) */}
          <div style={{
            position: 'absolute', bottom: '16px', left: '20px',
            color: '#71717a', fontSize: '11px', fontWeight: 600,
            background: 'rgba(0,0,0,0.4)', padding: '6px 12px', borderRadius: '6px',
            pointerEvents: 'none'
          }}>
            🖱 드래그: 이동 · 휠: 확대/축소 · ESC: 닫기
          </div>
        </div>

        {/* 우측 정보 패널 (구성요소 표 / 청구항 + 도면부호 설명) */}
        {showPanel && (hasComponents || hasClaim || hasCaption) && (
          <div style={{
            width: '460px', background: '#fff', borderLeft: '1px solid rgba(255,255,255,0.1)',
            display: 'flex', flexDirection: 'column', minHeight: 0
          }}>
            <div style={{ flex: 1, overflowY: 'auto' }}>
              {/* 독립항 구성요소 / 요약 */}
              {(hasComponents || hasClaim) && (
                <div>
                  <div style={{
                    padding: '12px 18px', borderBottom: '1px solid #ebedf0',
                    fontSize: '13px', fontWeight: 800, color: '#1a1a1a',
                    background: '#fafbfc', position: 'sticky', top: 0, zIndex: 1
                  }}>
                    {hasComponents ? '독립항 구성요소' : '독립항 요약'}
                  </div>
                  {hasComponents ? (
                    // 구성요소 표 (당사 컨셉 비교 제외)
                    <div style={{ padding: '14px' }}>
                      <div style={{ border: '1px solid #ebedf0', borderRadius: '8px', overflow: 'hidden' }}>
                        {/* 표 헤더 */}
                        <div style={{ display: 'grid', gridTemplateColumns: '44px 1fr', background: '#fafbfc', borderBottom: '1px solid #ebedf0' }}>
                          <div style={{ padding: '8px 6px', fontSize: '10.5px', fontWeight: 800, color: '#8a8f96', textAlign: 'center', borderRight: '1px solid #ebedf0', textTransform: 'uppercase', letterSpacing: '0.04em' }}>No.</div>
                          <div style={{ padding: '8px 12px', fontSize: '11.5px', fontWeight: 800, color: '#1a1a1a' }}>독립항 구성요소</div>
                        </div>
                        {/* 표 본문 */}
                        {patent.claimComponents.map((c, i) => (
                          <div key={i} style={{ display: 'grid', gridTemplateColumns: '44px 1fr', borderTop: i > 0 ? '1px solid #f0f1f3' : 'none', background: '#fff' }}>
                            <div style={{ padding: '10px 6px', fontSize: '12px', fontWeight: 800, color: '#FF5300', textAlign: 'center', borderRight: '1px solid #f0f1f3', background: '#fafbfc', display: 'flex', alignItems: 'flex-start', justifyContent: 'center' }}>
                              {i + 1}
                            </div>
                            <div style={{ padding: '10px 12px', fontSize: '12px', lineHeight: 1.6, color: '#1a1a1a', whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
                              {c.text || <span style={{ color: '#b0b3b8' }}>(내용 없음)</span>}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ) : (
                    // 기본형: 청구항 요약 텍스트 (HTML 그대로)
                    <div style={{ padding: '14px 18px', fontSize: '12.5px', lineHeight: 1.7, color: '#1a1a1a', whiteSpace: 'pre-wrap' }}
                      dangerouslySetInnerHTML={{ __html: patent.independentClaim || '' }} />
                  )}
                </div>
              )}

              {/* 도면부호 설명 */}
              {hasCaption && (
                <div>
                  <div style={{
                    padding: '12px 18px', borderTop: '1px solid #ebedf0', borderBottom: '1px solid #ebedf0',
                    fontSize: '13px', fontWeight: 800, color: '#1a1a1a',
                    background: '#fafbfc',
                    display: 'flex', alignItems: 'center', gap: '6px'
                  }}>
                    <ImageIcon size={13} color="#FF5300" />
                    도면부호 설명
                  </div>
                  <div style={{
                    padding: '12px 18px', fontSize: '12px', lineHeight: 1.7,
                    color: '#1a1a1a', whiteSpace: 'pre-wrap',
                    background: '#fffbf5'
                  }}>
                    {patent.figureCaption}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// =====================================================================
// 분해형 모드용 청구항 원문 미리보기 (접이식)
// =====================================================================
function ClaimPreview({ value, onChange }) {
  const [open, setOpen] = useState(false);
  const plainText = (() => {
    if (!value) return '';
    const s = String(value).replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    return s;
  })();
  const isEmpty = !plainText || plainText.length < 5;

  return (
    <div style={{
      background: isEmpty ? '#fef2f2' : '#fafbfc',
      border: `1px solid ${isEmpty ? '#fecaca' : '#ebedf0'}`,
      borderRadius: '8px',
      overflow: 'hidden'
    }}>
      <button
        onClick={() => setOpen(!open)}
        style={{
          width: '100%', padding: '9px 12px', background: 'transparent',
          border: 'none', cursor: 'pointer', display: 'flex',
          alignItems: 'center', justifyContent: 'space-between', gap: '8px',
          fontFamily: 'inherit', textAlign: 'left'
        }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '6px', minWidth: 0, flex: 1 }}>
          <FileText size={12} color={isEmpty ? '#dc2626' : '#8a8f96'} />
          <span style={{ fontSize: '11.5px', fontWeight: 800, color: isEmpty ? '#dc2626' : '#1a1a1a', whiteSpace: 'nowrap' }}>
            청구항 원문
          </span>
          {isEmpty ? (
            <span style={{ fontSize: '10.5px', color: '#dc2626', fontWeight: 600 }}>⚠ 비어있음 — 자동 분해 전에 입력 필요</span>
          ) : (
            <span style={{ fontSize: '11px', color: '#8a8f96', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', minWidth: 0 }}>
              {plainText.slice(0, 70)}{plainText.length > 70 ? '...' : ''}
            </span>
          )}
        </div>
        <span style={{ fontSize: '10px', color: '#8a8f96', fontWeight: 700, flexShrink: 0 }}>
          {open ? '닫기 ▲' : (isEmpty ? '입력 ▼' : '펼치기 ▼')}
        </span>
      </button>
      {open && (
        <div style={{ padding: '0 12px 12px' }}>
          <textarea
            value={plainText}
            onChange={e => onChange(e.target.value)}
            placeholder="청구항 원문을 입력하거나 「① 기본형」 모드에서 자동 채워진 텍스트를 확인하세요."
            style={{
              width: '100%', minHeight: '90px', padding: '10px 12px',
              fontSize: '12.5px', lineHeight: 1.65, color: '#1a1a1a',
              border: '1px solid #ebedf0', borderRadius: '7px',
              outline: 'none', resize: 'vertical', fontFamily: 'inherit',
              background: '#fff'
            }}
          />
        </div>
      )}
    </div>
  );
}

// =====================================================================
// 리치 텍스트 편집기 (밑줄 / 하이라이트 / 색상)
// =====================================================================
function RichTextEditor({ value, onChange, placeholder, minHeight = 120, fontSize = '13px' }) {
  const ref = useRef(null);
  const [focused, setFocused] = useState(false);

  // 마운트 시 + value 변경 시 DOM 동기화 (편집 중인 경우만 제외)
  useEffect(() => {
    if (!ref.current) return;
    const current = ref.current.innerHTML;
    const next = value || '';
    if (current === next) return;
    // 사용자가 직접 편집 중이면 건드리지 않음
    if (document.activeElement === ref.current) return;
    ref.current.innerHTML = next;
  }, [value]);

  const exec = (command, arg) => {
    ref.current && ref.current.focus();
    document.execCommand(command, false, arg);
    if (ref.current) onChange(ref.current.innerHTML);
  };

  const handleInput = () => { if (ref.current) onChange(ref.current.innerHTML); };

  const isEmpty = !value || value === '' || value === '<br>';

  const toolBtn = (label, title, onClick, style = {}) => (
    <button
      type="button"
      title={title}
      onMouseDown={e => { e.preventDefault(); onClick(); }}
      style={{
        minWidth: '26px', height: '24px', padding: '0 6px',
        border: '1px solid #e3e5e8', borderRadius: '5px', cursor: 'pointer',
        background: '#fff', fontSize: '12px', fontWeight: 700, color: '#555',
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'inherit', transition: 'all 0.12s', ...style
      }}
      onMouseOver={e => e.currentTarget.style.borderColor = '#FF5300'}
      onMouseOut={e => e.currentTarget.style.borderColor = '#e3e5e8'}>
      {label}
    </button>
  );

  return (
    <div>
      {/* 툴바 */}
      <div style={{ display: 'flex', gap: '4px', marginBottom: '8px', flexWrap: 'wrap' }}>
        {toolBtn(<span style={{ textDecoration: 'underline' }}>U</span>, '밑줄', () => exec('underline'))}
        {toolBtn(<span style={{ fontWeight: 800 }}>B</span>, '굵게', () => exec('bold'))}
        {toolBtn('형광', '노란 형광펜', () => exec('hiliteColor', '#fff3a3'), { background: '#fff3a3', color: '#7a5c00', borderColor: '#fde68a' })}
        {toolBtn('빨강', '빨강 글씨', () => exec('foreColor', '#dc2626'), { color: '#dc2626' })}
        {toolBtn('파랑', '파랑 글씨', () => exec('foreColor', '#2563eb'), { color: '#2563eb' })}
        {toolBtn('지움', '서식 지우기', () => { exec('removeFormat'); exec('hiliteColor', 'transparent'); }, { color: '#8a8f96' })}
      </div>
      {/* 편집 영역 */}
      <div style={{ position: 'relative' }}>
        {isEmpty && !focused && (
          <div style={{
            position: 'absolute', top: 0, left: 0, pointerEvents: 'none',
            color: '#b0b3b8', fontSize, lineHeight: 1.75, whiteSpace: 'pre-wrap'
          }}>{placeholder}</div>
        )}
        <div
          ref={ref}
          contentEditable
          suppressContentEditableWarning
          onInput={handleInput}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          style={{
            minHeight: minHeight + 'px', outline: 'none', fontSize,
            lineHeight: 1.75, color: '#1a1a1a', fontWeight: 500, whiteSpace: 'pre-wrap',
            wordBreak: 'break-word'
          }}
        />
      </div>
    </div>
  );
}

// =====================================================================
// 비교 이미지 첨부 (붙여넣기 / 드래그 / 클릭)
// =====================================================================
function ComparisonImage({ image, onChange, onZoom }) {
  const inputRef = useRef(null);
  const dropRef = useRef(null);

  const upload = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => onChange(e.target.result);
    reader.readAsDataURL(file);
  };
  const handlePaste = (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) { upload(file); e.preventDefault(); break; }
      }
    }
  };

  if (image) {
    return (
      <div style={{ marginTop: '12px', position: 'relative' }}>
        <img src={image} alt="비교" onClick={() => onZoom && onZoom({ src: image, rotation: 0 })} style={{ width: '100%', borderRadius: '8px', border: '1px solid #ebedf0', display: 'block', cursor: 'zoom-in' }} />
        <div style={{ position: 'absolute', top: '6px', right: '6px', display: 'flex', gap: '5px' }}>
          <button onClick={() => inputRef.current?.click()}
            style={{ background: 'rgba(26,26,26,0.8)', color: '#fff', border: 'none', padding: '5px 9px', borderRadius: '6px', fontSize: '10.5px', fontWeight: 700, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: '3px' }}>
            <Upload size={11} /> 교체
          </button>
          <button onClick={() => onChange(null)}
            style={{ background: 'rgba(220,38,38,0.85)', color: '#fff', border: 'none', padding: '5px 8px', borderRadius: '6px', fontSize: '10.5px', fontWeight: 700, cursor: 'pointer' }}>
            <X size={11} />
          </button>
        </div>
        <input ref={inputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => upload(e.target.files?.[0])} />
      </div>
    );
  }

  return (
    <div
      ref={dropRef}
      tabIndex={0}
      onPaste={handlePaste}
      onClick={() => inputRef.current?.click()}
      onDrop={e => { e.preventDefault(); e.stopPropagation(); upload(e.dataTransfer.files?.[0]); }}
      onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = '#FF5300'; e.currentTarget.style.background = '#fff7ed'; }}
      onDragLeave={e => { e.currentTarget.style.borderColor = '#e3e5e8'; e.currentTarget.style.background = '#fff'; }}
      style={{
        marginTop: '12px', padding: '14px', background: '#fff',
        border: '1.5px dashed #e3e5e8', borderRadius: '8px', cursor: 'pointer',
        outline: 'none', textAlign: 'center', transition: 'all 0.15s'
      }}>
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', color: '#a1a1aa', fontSize: '11px', fontWeight: 600 }}>
        <ImageIcon size={14} /> 비교 이미지 추가 (Ctrl+V · 드래그 · 클릭)
      </div>
      <input ref={inputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => upload(e.target.files?.[0])} />
    </div>
  );
}

// =====================================================================
// 서지사항 헬퍼
// =====================================================================
function legalStatusStyle(status) {
  const map = {
    '등록': { bg: '#f0fdf4', color: '#16a34a' },
    '심사': { bg: '#eff6ff', color: '#2563eb' },
    '공개': { bg: '#f5f3ff', color: '#7c3aed' },
    '소멸': { bg: '#fef2f2', color: '#dc2626' },
    '만료': { bg: '#f8fafc', color: '#64748b' },
    '포기': { bg: '#fff7ed', color: '#c2410c' },
  };
  return map[status] || { bg: '#fff', color: '#1a1a1a' };
}

function addStatusRow(p, onUpdate) {
  // 아직 사용 안 한 상태 중 첫 번째를 기본값으로
  const used = (p.statusRows || []).map(r => r.status);
  const next = STATUS_LIST.find(s => !used.includes(s)) || '등록';
  const rows = [...(p.statusRows || []), { status: next, country: '' }];
  onUpdate(p.id, 'statusRows', rows);
}
function updateStatusRow(p, idx, key, value, onUpdate) {
  const rows = (p.statusRows || []).map((r, i) => i === idx ? { ...r, [key]: value } : r);
  onUpdate(p.id, 'statusRows', rows);
}
function removeStatusRow(p, idx, onUpdate) {
  const rows = (p.statusRows || []).filter((_, i) => i !== idx);
  onUpdate(p.id, 'statusRows', rows);
}

function addClaimComponent(p, onUpdate) {
  const list = [...(p.claimComponents || []), { text: '', match: '', note: '' }];
  onUpdate(p.id, 'claimComponents', list);
}
function updateClaimComponent(p, idx, key, value, onUpdate) {
  const list = (p.claimComponents || []).map((c, i) => i === idx ? { ...c, [key]: value } : c);
  onUpdate(p.id, 'claimComponents', list);

  // 매칭이 변경된 경우 Risk 자동 판정
  if (key === 'match') {
    const matches = list.map(c => c.match).filter(m => m);
    if (matches.length === list.length) {
      // 모든 구성요소에 매칭이 입력된 경우만 자동 판정
      if (matches.some(m => m === '×')) {
        onUpdate(p.id, 'patentRisk', '침해 Risk 낮음');
      } else if (matches.every(m => m === '○')) {
        onUpdate(p.id, 'patentRisk', '침해 Risk 높음');
      }
      // △가 섞여있으면 자동 변경하지 않음
    }
  }
}
function removeClaimComponent(p, idx, onUpdate) {
  const list = (p.claimComponents || []).filter((_, i) => i !== idx);
  onUpdate(p.id, 'claimComponents', list);
}

                <div style={{ display: 'grid', gridTemplateColumns: '40px 1fr 1fr 32px', background: '#fafbfc', borderBottom: '1px solid #ebedf0' }}>
                  <div style={{ padding: '10px 8px', fontSize: '11px', fontWeight: 800, color: '#8a8f96', textAlign: 'center', borderRight: '1px solid #ebedf0', textTransform: 'uppercase', letterSpacing: '0.04em' }}>No.</div>
                  <div style={{ padding: '10px 14px', fontSize: '12px', fontWeight: 800, color: '#1a1a1a', borderRight: '1px solid #ebedf0' }}>독립항 구성요소</div>
                  <div style={{ padding: '10px 14px', fontSize: '12px', fontWeight: 800, color: '#1a1a1a', borderRight: '1px solid #ebedf0' }}>당사 컨셉 비교</div>
                  <div></div>
                </div>
                {/* 표 본문 */}
                {(p.claimComponents || []).map((comp, ci) => {
                  const m = comp.match || '';
                  const isCompleted = m !== ''; // ○/△/× 선택되면 완료 상태
                  const noteHasText = comp.note && comp.note.trim().length > 0;
                  return (
                    <div key={ci} style={{ display: 'grid', gridTemplateColumns: '40px 1fr 1fr 32px', background: '#fff', borderTop: ci > 0 ? '1px solid #f0f1f3' : 'none', transition: 'background 0.2s' }}>
                      {/* No */}
                      <div style={{ padding: '8px 6px', fontSize: '13px', fontWeight: 800, color: '#FF5300', textAlign: 'center', borderRight: '1px solid #f0f1f3', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', background: '#fafbfc' }}>
                        {ci + 1}
                      </div>
                      {/* 구성요소 텍스트 */}
                      <div style={{ padding: '6px 12px', borderRight: '1px solid #f0f1f3' }}>
                        <AutoTextarea
                          value={comp.text}
                          onChange={v => updateClaimComponent(p, ci, 'text', v, onUpdate)}
                          placeholder="예) 트레드부(1)의 내면(5)에 띠 형상의 흡음재(6)가 부착되고,"
                          style={{ fontSize: '12.5px', lineHeight: 1.65, color: '#1a1a1a', fontWeight: 500, background: 'transparent' }}
                          minHeight={20}
                        />
                      </div>
                      {/* 당사 컨셉 비교 (○△× 버튼 + 메모 통합) */}
                      <div style={{ padding: '6px 12px', borderRight: '1px solid #f0f1f3', background: isCompleted ? '#fafffe' : 'transparent', transition: 'background 0.2s' }}>
                        <div style={{ display: 'flex', gap: '4px', marginBottom: noteHasText || !isCompleted ? '6px' : '0' }}>
                          {['○', '△', '×'].map(sym => {
                            const active = m === sym;
                            const hasSelection = m !== '';
                            // 선택된 게 있고, 이 버튼이 선택된 게 아니면 숨김
                            if (hasSelection && !active) return null;
                            const s = sym === '○' ? { bg: '#f0fdf4', color: '#16a34a', border: '#bbf7d0' }
                              : sym === '×' ? { bg: '#fef2f2', color: '#dc2626', border: '#fecaca' }
                              : { bg: '#fff7ed', color: '#c2410c', border: '#fed7aa' };
                            return (
                              <button key={sym}
                                onClick={() => updateClaimComponent(p, ci, 'match', active ? '' : sym, onUpdate)}
                                title={active ? '클릭하여 다시 선택' : sym}
                                style={{
                                  width: active ? '40px' : '32px',
                                  padding: active ? '6px 0' : '5px 0',
                                  background: active ? s.bg : '#fff',
                                  color: active ? s.color : '#a1a1aa',
                                  border: `1.5px solid ${active ? s.border : '#ebedf0'}`,
                                  borderRadius: '6px', cursor: 'pointer',
                                  fontSize: active ? '15px' : '13px',
                                  fontWeight: 800,
                                  fontFamily: 'inherit', transition: 'all 0.15s'
                                }}>{sym}</button>
                            );
                          })}
                        </div>
                        {/* 비교 메모: 입력값 있으면 표시, 없고 미선택이면 placeholder 표시, 없고 선택만 했으면 작게 + 보일듯말듯 */}
                        {(noteHasText || !isCompleted) && (
                          <AutoTextarea
                            value={comp.note}
                            onChange={v => updateClaimComponent(p, ci, 'note', v, onUpdate)}
                            placeholder="- 비교 내용 작성 (선택)"
                            style={{ fontSize: '12.5px', lineHeight: 1.65, color: '#1a1a1a', fontWeight: 500, background: 'transparent' }}
                            minHeight={20}
                          />
                        )}
                        {/* 선택 완료 + 메모 없음일 때만 작은 추가 버튼 */}
                        {isCompleted && !noteHasText && (
                          <button
                            onClick={() => updateClaimComponent(p, ci, 'note', ' ', onUpdate)}
                            style={{
                              background: 'transparent', border: 'none', color: '#c0c4ca',
                              cursor: 'pointer', fontSize: '10.5px', fontWeight: 600,
                              padding: '0', marginTop: '2px', fontFamily: 'inherit'
                            }}
                            onMouseOver={e => e.currentTarget.style.color = '#7c3aed'}
                            onMouseOut={e => e.currentTarget.style.color = '#c0c4ca'}>
                            + 비교 내용 추가
                          </button>
                        )}
                      </div>
                      {/* 삭제 버튼 */}
                      <div style={{ padding: '8px 4px', display: 'flex', alignItems: 'flex-start', justifyContent: 'center' }}>
                        {(p.claimComponents || []).length > 1 && (
                          <button onClick={() => removeClaimComponent(p, ci, onUpdate)}
                            style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: '#cbd0d6', padding: '4px', display: 'flex' }}
                            onMouseOver={e => e.currentTarget.style.color = '#dc2626'}
                            onMouseOut={e => e.currentTarget.style.color = '#cbd0d6'}>
                            <X size={14} />
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* 구성요소 추가 + 비교 이미지 */}
              <button
                onClick={() => addClaimComponent(p, onUpdate)}
                style={{
                  width: '100%', padding: '9px', background: 'transparent',
                  border: '1px dashed #d0d3d7', borderRadius: '8px', cursor: 'pointer',
                  color: '#8a8f96', fontSize: '11.5px', fontWeight: 700,
                  fontFamily: 'inherit', display: 'flex', alignItems: 'center',
                  justifyContent: 'center', gap: '5px', transition: 'all 0.15s'
                }}
                onMouseOver={e => { e.currentTarget.style.borderColor = '#FF5300'; e.currentTarget.style.color = '#FF5300'; }}
                onMouseOut={e => { e.currentTarget.style.borderColor = '#d0d3d7'; e.currentTarget.style.color = '#8a8f96'; }}>
                <Plus size={12} /> 구성요소 추가
              </button>

              {/* 비교 이미지 첨부 */}
              <ComparisonImage
                image={p.comparisonImage}
                onChange={img => onUpdate(p.id, 'comparisonImage', img)}
                onZoom={onZoom}
              />
            </div>
          ) : (
            <RichTextEditor
              value={p.independentClaim}
              onChange={v => onUpdate(p.id, 'independentClaim', v)}
              placeholder="WIPS 엑셀의 독립청구항-번역문이 자동으로 발췌됩니다. 드래그로 선택 후 강조할 수 있어요."
              minHeight={120}
              fontSize="14px"
            />
          )}
        </div>

        {/* 당사 컨셉 비교 — 분해형에서는 표에 통합되므로 숨김 */}
        {reportFormat !== 'components' && (
        <div style={{ padding: '20px 22px', background: '#fafbfc' }}>
          <div className="lbl" style={{ marginBottom: '14px' }}>당사 컨셉 비교</div>
          <div style={{ display: 'flex', gap: '5px', marginBottom: '14px' }}>
            <button onClick={() => { setRiskMode('preset'); onUpdate(p.id, 'patentRisk', '침해 Risk 낮음'); }}
              style={{ flex: 1, padding: '7px 4px', background: riskMode === 'preset' && p.patentRisk?.includes('낮음') ? '#f0fdf4' : '#fff', border: riskMode === 'preset' && p.patentRisk?.includes('낮음') ? '1.5px solid #bbf7d0' : '1.5px solid #ebedf0', color: riskMode === 'preset' && p.patentRisk?.includes('낮음') ? '#16a34a' : '#a1a1aa', fontSize: '11px', fontWeight: 800, borderRadius: '7px', cursor: 'pointer', transition: 'all 0.15s' }}>
              ✓ 낮음
            </button>
            <button onClick={() => { setRiskMode('preset'); onUpdate(p.id, 'patentRisk', '침해 Risk 높음'); }}
              style={{ flex: 1, padding: '7px 4px', background: riskMode === 'preset' && p.patentRisk?.includes('높음') ? '#fef2f2' : '#fff', border: riskMode === 'preset' && p.patentRisk?.includes('높음') ? '1.5px solid #fecaca' : '1.5px solid #ebedf0', color: riskMode === 'preset' && p.patentRisk?.includes('높음') ? '#dc2626' : '#a1a1aa', fontSize: '11px', fontWeight: 800, borderRadius: '7px', cursor: 'pointer', transition: 'all 0.15s' }}>
              ⚠ 높음
            </button>
            <button onClick={() => { setRiskMode('custom'); if (p.patentRisk?.includes('낮음') || p.patentRisk?.includes('높음')) onUpdate(p.id, 'patentRisk', ''); }}
              style={{ flex: 1.1, padding: '7px 4px', background: riskMode === 'custom' ? '#fff7ed' : '#fff', border: riskMode === 'custom' ? '1.5px solid #fed7aa' : '1.5px solid #ebedf0', color: riskMode === 'custom' ? '#c2410c' : '#a1a1aa', fontSize: '11px', fontWeight: 800, borderRadius: '7px', cursor: 'pointer', transition: 'all 0.15s' }}>
              직접입력
            </button>
          </div>
          {riskMode === 'custom' && (
            <input value={p.patentRisk === '검토중' ? '' : p.patentRisk} onChange={e => onUpdate(p.id, 'patentRisk', e.target.value)} placeholder="예: 보유, 검토 중, 부분 침해 가능성..." autoFocus
              style={{ background: '#fff', border: '1px solid #ebedf0', padding: '8px 10px', fontSize: '12px', fontWeight: 600, color: '#1a1a1a', outline: 'none', borderRadius: '7px', marginBottom: '14px', width: '100%' }}
              onFocus={e => e.currentTarget.style.borderColor = '#FF5300'} onBlur={e => e.currentTarget.style.borderColor = '#ebedf0'} />
          )}
          {reportFormat === 'components' ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
              {(p.claimComponents || []).map((comp, ci) => {
                const m = comp.match || '';
                return (
                  <div key={ci} style={{ background: '#fff', border: '1px solid #ebedf0', borderRadius: '8px', padding: '10px 12px' }}>
                    {/* ○/△/× 매칭 버튼 */}
                    <div style={{ display: 'flex', gap: '4px', marginBottom: '7px' }}>
                      {['○', '△', '×'].map(sym => {
                        const active = m === sym;
                        const s = sym === '○' ? { bg: '#f0fdf4', color: '#16a34a', border: '#bbf7d0' }
                          : sym === '×' ? { bg: '#fef2f2', color: '#dc2626', border: '#fecaca' }
                          : { bg: '#fff7ed', color: '#c2410c', border: '#fed7aa' };
                        return (
                          <button key={sym}
                            onClick={() => updateClaimComponent(p, ci, 'match', active ? '' : sym, onUpdate)}
                            style={{
                              flex: 1, padding: '5px 0',
                              background: active ? s.bg : '#fff',
                              color: active ? s.color : '#a1a1aa',
                              border: `1.5px solid ${active ? s.border : '#ebedf0'}`,
                              borderRadius: '6px', cursor: 'pointer',
                              fontSize: '13px', fontWeight: 800,
                              fontFamily: 'inherit', transition: 'all 0.15s'
                            }}>{sym}</button>
                        );
                      })}
                    </div>
                    {/* 비교 메모 */}
                    <AutoTextarea
                      value={comp.note}
                      onChange={v => updateClaimComponent(p, ci, 'note', v, onUpdate)}
                      placeholder="비교 내용 입력"
                      style={{ fontSize: '12.5px', lineHeight: 1.6, color: '#1a1a1a', fontWeight: 500 }}
                      minHeight={36}
                    />
                  </div>
                );
              })}
              <ComparisonImage
                image={p.comparisonImage}
                onChange={img => onUpdate(p.id, 'comparisonImage', img)}
                onZoom={onZoom}
              />
            </div>
          ) : (
            <>
              <AutoTextarea value={p.comparison} onChange={v => onUpdate(p.id, 'comparison', v)} placeholder="▶ 비교 내용을 입력하세요" style={{ fontSize: '13.5px', lineHeight: 1.7, color: '#1a1a1a', fontWeight: 500 }} minHeight={100} />
              <ComparisonImage
                image={p.comparisonImage}
                onChange={img => onUpdate(p.id, 'comparisonImage', img)}
                onZoom={onZoom}
              />
            </>
          )}
        </div>
        )}
      </div>

      {/* AI 자동 분해 사용법 안내 모달 */}
      {showHelpModal && (
        <div
          onClick={() => setShowHelpModal(false)}
          style={{
            position: 'fixed', inset: 0, zIndex: 1000,
            background: 'rgba(10,10,15,0.6)', backdropFilter: 'blur(4px)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px'
          }}>
          <div onClick={e => e.stopPropagation()}
            style={{
              background: '#fff', borderRadius: '16px', padding: '28px',
              maxWidth: '560px', width: '100%', maxHeight: '85vh', overflowY: 'auto',
              boxShadow: '0 20px 60px rgba(0,0,0,0.3)'
            }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '18px' }}>
              <div style={{ width: '40px', height: '40px', background: 'linear-gradient(135deg, #8b5cf6, #a78bfa)', borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '20px' }}>✨</div>
              <div>
                <div style={{ fontSize: '17px', fontWeight: 800, color: '#1a1a1a' }}>AI 자동 분해 사용법</div>
                <div style={{ fontSize: '12px', color: '#8a8f96' }}>처음 사용 시 한 번만 설정하면 됩니다</div>
              </div>
            </div>

            <div style={{ background: '#fafbfc', border: '1px solid #ebedf0', borderRadius: '10px', padding: '16px', marginBottom: '14px', fontSize: '12.5px', color: '#1a1a1a', lineHeight: 1.75 }}>
              <div style={{ fontWeight: 800, marginBottom: '10px', color: '#6b21a8', fontSize: '13px' }}>📌 설정 방법 (5분, 무료)</div>
              <div style={{ marginBottom: '8px' }}><strong>1️⃣ API 키 발급</strong></div>
              <div style={{ marginBottom: '12px', paddingLeft: '18px', color: '#555' }}>
                <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" style={{ color: '#7c3aed', fontWeight: 700, textDecoration: 'underline' }}>Google AI Studio</a> 접속 (Google 계정 필요) → "Create API key" 클릭 → 발급된 키 복사
              </div>
              <div style={{ marginBottom: '8px' }}><strong>2️⃣ 키 입력</strong></div>
              <div style={{ marginBottom: '12px', paddingLeft: '18px', color: '#555' }}>
                위쪽 「🔑 키」 버튼 클릭 → 복사한 키 붙여넣기 → 저장
              </div>
              <div style={{ marginBottom: '8px' }}><strong>3️⃣ 자동 분해 실행</strong></div>
              <div style={{ paddingLeft: '18px', color: '#555' }}>
                「✨ 자동 분해」 클릭 → 청구항이 구성요소별로 자동 분해됨
              </div>
            </div>

            <div style={{ background: '#f5f3ff', border: '1px solid #e9d5ff', borderRadius: '10px', padding: '12px 14px', marginBottom: '14px', fontSize: '11.5px', color: '#6b21a8', lineHeight: 1.6 }}>
              <div style={{ fontWeight: 800, marginBottom: '4px' }}>💎 무료 한도</div>
              <div>분당 15회 · 하루 1,500회까지 무료로 사용 가능합니다.</div>
            </div>

            <div style={{ background: '#fffbeb', border: '1px solid #fde68a', borderRadius: '10px', padding: '12px 14px', marginBottom: '20px', fontSize: '11.5px', color: '#92400e', lineHeight: 1.6 }}>
              <div style={{ fontWeight: 800, marginBottom: '4px' }}>⚠ 주의사항</div>
              <div>• API 키는 본인 브라우저에만 저장되며 외부로 전송되지 않습니다<br/>• 키를 다른 사람과 공유하지 마세요 (개인 한도 차감됨)<br/>• 청구항 텍스트는 Google Gemini로 전송되니 영업비밀 청구항은 회사 정책 확인 후 사용</div>
            </div>

            <button onClick={() => setShowHelpModal(false)}
              style={{ width: '100%', padding: '12px', background: 'linear-gradient(135deg, #8b5cf6, #a78bfa)', border: 'none', borderRadius: '9px', cursor: 'pointer', fontSize: '13px', fontWeight: 800, color: '#fff', fontFamily: 'inherit', boxShadow: '0 4px 14px rgba(139,92,246,0.3)' }}>
              확인
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function BiblioField({ icon, label, labelColor = '#1a1a1a', children }) {
  return (
    <div style={{ marginBottom: '11px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '5px', fontSize: '12px', fontWeight: 800, color: labelColor, marginBottom: '3px' }}>
        <span style={{ opacity: 0.8 }}>{icon}</span>{label}
      </div>
      {children}
    </div>
  );
}

const loadingEl = document.getElementById('loading');
if (loadingEl) loadingEl.style.display = 'none';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PatentRiskReviewSystem));
} catch (err) {
  var eb = document.getElementById('errbox');
  var ld = document.getElementById('loading');
  if (ld) ld.style.display = 'none';
  if (eb) { eb.style.display = 'block'; eb.textContent = '오류 발생:\n\n' + (err && err.stack ? err.stack : err); }
}
</script>
</body>
</html>
